<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Odporucania</title>
  <meta name="theme-color" content="#f7f9fc">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Flegma">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #16202a;
      --muted: #667085;
      --line: #d8dee6;
      --focus: #1d6fb8;
      --danger: #b42318;
      --danger-bg: #fff1f0;
      --shadow: 0 10px 24px rgba(22, 32, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
      -webkit-text-size-adjust: 100%;
    }

    .app {
      width: min(1180px, calc(100% - 20px));
      margin: 0 auto;
      padding: 14px 0 86px;
    }

    header {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle,
    .muted {
      color: var(--muted);
    }

    .subtitle {
      margin: 6px 0 0;
      font-size: 14px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .panel,
    .template-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel-inner {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .panel-title {
      margin: 0;
      font-size: 19px;
    }

    form,
    .stack {
      display: grid;
      gap: 10px;
    }

    label {
      display: grid;
      gap: 6px;
      font-size: 14px;
      font-weight: 700;
    }

    input,
    select {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 11px;
      background: #fff;
      color: var(--text);
      font: 16px Arial, Helvetica, sans-serif;
    }

    button {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--focus);
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--focus);
      color: #fff;
      font: 700 15px Arial, Helvetica, sans-serif;
      cursor: pointer;
    }

    .danger {
      border-color: #f0b7b2;
      background: var(--danger-bg);
      color: var(--danger);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .template-card {
      display: grid;
      gap: 8px;
      padding: 12px;
      box-shadow: none;
    }

    .template-title {
      margin: 0;
      font-size: 17px;
    }

    .template-items {
      display: grid;
      gap: 4px;
    }

    .notice {
      display: none;
      padding: 10px 12px;
      border-radius: 8px;
      background: #eaf7ef;
      color: #146c43;
      font-weight: 700;
    }

    .notice.is-visible {
      display: block;
    }

    @media (min-width: 760px) {
      .app {
        width: min(1180px, calc(100% - 32px));
        padding: 28px 0 40px;
      }

      h1 {
        font-size: clamp(34px, 4vw, 42px);
      }

      .layout {
        grid-template-columns: 380px 1fr;
        gap: 18px;
      }

      .panel-inner {
        padding: 18px;
      }
    }
  </style>
  <link rel="stylesheet" href="ui.css">
</head>
<body>
  <div class="app-shell">
  <nav class="side-menu" aria-label="Hlavne menu">
    <div class="menu-block menu-main">
      <a href="graphs.html">Grafy</a>
      <a href="diary.html">Kalorie</a>
      <a href="calendar.html">Kalendar</a>
    </div>
    <div class="menu-block menu-tools">
      <a href="fit-import.html">FIT import</a>
      <a href="profile.html">Profil</a>
      <a href="foods.html">Jedla</a>
      <a href="recipes.html">Recepty</a>
      <a href="recommendations.html" aria-current="page">Odporucania</a>
      <a href="settings.html">Nastavenie</a>
      <a href="data.html">Data</a>
    </div>
  </nav>
  <main class="app">
    <header>
      <div>
        <h1>Odporucania</h1>
        <p class="subtitle">Tvoje stabilne jedla s gramazou. AI trener ich pouzije ako prvu volbu a dopocita zvysok dna.</p>
      </div>
    </header>

    <section class="layout">
      <aside class="panel">
        <div class="panel-inner">
          <h2 class="panel-title">Pridat sablonu</h2>
          <form id="templateForm" autocomplete="off">
            <label>
              Nazov
              <input id="templateName" required placeholder="napr. stabilne ranajky">
            </label>
            <div class="grid-2">
              <label>
                Jedlo dna
                <select id="meal">
                  <option value="ranajky">Ranajky</option>
                  <option value="obed">Obed</option>
                  <option value="snack">Snack</option>
                  <option value="vecera">Vecera</option>
                </select>
              </label>
              <label>
                Rezim
                <select id="mode">
                  <option value="any">Vzdy</option>
                  <option value="rest">Volno</option>
                  <option value="gym">Fitko</option>
                  <option value="training">Trening</option>
                  <option value="hard">Tazky trening</option>
                  <option value="carbload">Carbload</option>
                </select>
              </label>
            </div>
            <label>
              Jedlo
              <input id="foodName" list="foodOptions" required placeholder="napr. Ovsene vlocky">
              <datalist id="foodOptions"></datalist>
            </label>
            <label>
              Gramaz
              <input id="grams" type="number" min="1" step="1" required inputmode="numeric">
            </label>
            <button type="submit">Ulozit sablonu</button>
          </form>
          <div class="notice" id="notice" role="status"></div>
        </div>
      </aside>

      <section class="panel">
        <div class="panel-inner">
          <h2 class="panel-title">Moje sablony</h2>
          <div class="stack" id="templateList"></div>
        </div>
      </section>
    </section>
  </main>
  </div>

  <script src="pwa.js" defer></script>
  <script src="settings.js" defer></script>
  <script>
    const FOOD_KEY = 'flegma_tabulky_foods_v1';
    const TEMPLATE_KEY = 'flegma_tabulky_recommendations_v1';
    const foods = readArray(FOOD_KEY);
    let templates = readArray(TEMPLATE_KEY);

    const form = document.getElementById('templateForm');
    const foodOptions = document.getElementById('foodOptions');
    const list = document.getElementById('templateList');
    const notice = document.getElementById('notice');

    foodOptions.innerHTML = foods.map((food) => `<option value="${escapeHtml(food.name)}"></option>`).join('');
    form.addEventListener('submit', (event) => {
      event.preventDefault();
      saveTemplate();
    });

    render();

    function saveTemplate() {
      const food = findFood(value('foodName'));
      if (!food) {
        showNotice('Jedlo najprv pridaj do databazy alebo vyber z nasepkavaca.');
        return;
      }

      const meal = value('meal');
      const mode = value('mode');
      const existing = templates.find((template) => template.meal === meal && template.mode === mode);
      const item = {
        foodId: food.id,
        name: food.name,
        grams: readNumber('grams')
      };

      if (existing) {
        existing.name = value('templateName') || existing.name;
        existing.items.push(item);
      } else {
        templates.push({
          id: crypto.randomUUID(),
          name: value('templateName'),
          meal,
          mode,
          items: [item]
        });
      }

      persist();
      form.reset();
      showNotice('Sablona bola ulozena.');
      render();
    }

    function deleteTemplate(id) {
      templates = templates.filter((template) => template.id !== id);
      persist();
      render();
    }

    function render() {
      if (!templates.length) {
        list.innerHTML = '<p class="muted">Zatial nemas ziadne osobne odporucanie.</p>';
        return;
      }

      list.innerHTML = templates.map((template) => {
        const totals = templateTotals(template);
        return `
          <article class="template-card">
            <h3 class="template-title">${escapeHtml(template.name)} - ${mealLabel(template.meal)} / ${modeLabel(template.mode)}</h3>
            <div class="template-items">
              ${template.items.map((item) => `<span>${escapeHtml(item.name)} ${formatNumber(item.grams)} g</span>`).join('')}
            </div>
            <p class="muted">${formatNumber(totals.kcal)} kcal, B ${formatNumber(totals.protein)} g, S ${formatNumber(totals.carbs)} g, T ${formatNumber(totals.fat)} g</p>
            <button class="danger" type="button" onclick="deleteTemplate('${template.id}')">Vymazat</button>
          </article>
        `;
      }).join('');
    }

    function templateTotals(template) {
      return template.items.reduce((sum, item) => {
        const food = foods.find((entry) => entry.id === item.foodId || entry.name === item.name);
        if (!food) return sum;
        const ratio = item.grams / 100;
        sum.kcal += food.kcal * ratio;
        sum.protein += food.protein * ratio;
        sum.carbs += food.carbs * ratio;
        sum.fat += food.fat * ratio;
        return sum;
      }, { kcal: 0, protein: 0, carbs: 0, fat: 0 });
    }

    function persist() {
      localStorage.setItem(TEMPLATE_KEY, JSON.stringify(templates));
    }

    function findFood(name) {
      const normalized = name.trim().toLowerCase();
      return foods.find((food) => food.name.toLowerCase() === normalized);
    }

    function readArray(key) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function value(id) {
      return document.getElementById(id).value.trim();
    }

    function readNumber(id) {
      const number = Number.parseFloat(value(id).replace(',', '.'));
      return Number.isFinite(number) ? number : 0;
    }

    function mealLabel(meal) {
      return { ranajky: 'ranajky', obed: 'obed', snack: 'snack', vecera: 'vecera' }[meal] || meal;
    }

    function modeLabel(mode) {
      return { any: 'vzdy', rest: 'volno', gym: 'fitko', training: 'trening', hard: 'tazky', carbload: 'carbload' }[mode] || mode;
    }

    function formatNumber(valueNumber) {
      return Number(valueNumber || 0).toLocaleString('sk-SK', { maximumFractionDigits: 1 });
    }

    function escapeHtml(valueText) {
      return String(valueText)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function showNotice(message) {
      notice.textContent = message;
      notice.classList.add('is-visible');
      window.clearTimeout(showNotice.timeout);
      showNotice.timeout = window.setTimeout(() => notice.classList.remove('is-visible'), 2500);
    }
  </script>
</body>
</html>
